version: '3.8'

services:
  deefix:
    image: ghcr.io/2t0m/deefix:main
    container_name: deefix
    environment:
      - FIX_TAGS=true
      - FETCH_LYRICS=true
      - REMOVE_DUPLICATES=true
      - FETCH_VIDEO_ARTWORK=true
      - FIX_GAIN=true
      - ANALYZE_ESSENTIA=false
      - ORGANIZE_MP3=true
      - FIX_MP3_PERMISSION=true
      - AUDIOMUSE_AI_CALL=false
      - AUDIOMUSE_AI_URL=http://audiomuse-ai:8000
      - AUDIOMUSE_AI_DEBOUNCE=30
    volumes:
      # Mount your MP3 folder - change the left side to your actual path
      - /path/to/your/music:/music
      # Persist the database
      - ./data:/data
    restart: unless-stopped
